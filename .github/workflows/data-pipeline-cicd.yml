# Workflow environment configuration
env:
  PYTHON_VERSION: '3.10'
  ENVIRONMENT: 'simulation'

# PRACTICE CHALLENGE 1: Workflow Triggers
# Task: Configure workflow triggers for main branch pushes and pull requests,
# excluding documentation files from triggering the workflow.
# REQUIREMENTS:
# * Trigger on push to main branch
# * Trigger on pull requests to main branch
# * Exclude markdown files (*.md) from triggering
# * Exclude markdown files from docs/ directory from triggering
# * Ensure efficient resource usage by filtering unnecessary runs

# YOUR CODE HERE
# Add your trigger configuration here
# Use this structure:
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'README*'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'README*'
      - 'docs/**'

# PROVIDED CODE - DO NOT MODIFY
name: Run Comprehensive Tests
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Install system dependencies
    run: |
      sudo apt-get update && sudo apt-get install -y yq jq
      rm -rf /var/lib/apt/lists/*

  - name: Install dependencies and restart Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pytest pyyaml requests
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  - name: Run configuration suite
    run: |
      python -m pytest tests/test_pipeline.py -v
      echo "All tests passed successfully!"

  - name: Validate pipeline configuration
    run: |
      echo "Validating pipeline configuration..."
      python -c "import yaml; print('YAML is valid')"
      echo "Code quality check: Passed"

# --------------------------------------------------------------------
# PRACTICE CHALLENGE 2: Build Simulation
# Task: Implement build simulation job that validates Docker configuration,
# creates version-tagged artifacts, and simulates registry operations.
# REQUIREMENTS:
# * Job must depend on successful test completion (needs: test)
# * Create and validate Dockerfile simulation
# * Generate artifacts tagged with Git SHA and 'latest' identifiers
# * Upload artifacts using action/upload-artifact@v3 for deployment job
# * Include comprehensive build validation and error handling
# * Simulate multi-platform build process

# YOUR CODE HERE
jobs:
  build:
    name: Build and Package Artifacts
    runs-on: ubuntu-latest
    # Add job dependency here - should only run after successful testing
    needs: [ test ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create realistic Dockerfile for validation
        run: |
          cat << 'EOF' > Dockerfile
          FROM python:3.10-slim
          # Set working directory
          WORKDIR /app
          # Install system dependencies
          RUN apt-get update && apt-get install -y \
              curl \
              && rm -rf /var/lib/apt/lists/*
          # Copy requirements and install Python dependencies
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          # Copy application code
          COPY . .
          # Run python script
          CMD ["python", "src/main.py"]
          EOF

      - name: Validate Dockerfile configuration
        run: |
          echo "Validating Docker configuration..."
          # Check Dockerfile exists and has required components
          if [ ! -f Dockerfile ]; then
              echo "Dockerfile not found"
              echo "FAIL: Dockerfile missing"
              exit 1
          fi
          # Validate Dockerfile content
          if ! grep -q "FROM python" Dockerfile; then
              echo "Error: Base image specified incorrectly"
              echo "FAIL: Invalid base image"
              exit 1
          fi
          if ! grep -q "WORKDIR /app" Dockerfile; then
              echo "Error: WORKDIR missing or incorrect"
              echo "FAIL: Incorrect WORKDIR setup"
              exit 1
          fi
          echo "Dockerfile structural validation passed successfully!"

